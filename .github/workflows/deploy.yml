name: Deploy frontend to S3 + CloudFront

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      # DO NOT ADD --delete FLAG
      # This bucket is SHARED with RAG infrastructure, not frontend-only.
      # --delete would wipe documents/ (61MB vector index, irreplaceable),
      # lambda/ (Lambda deployment packages), and cloudtrail/ (audit logs).
      # Bucket cleanup happens manually if at all.
      - name: Sync frontend to S3
        run: |
          aws s3 sync frontend/ s3://rag-chatbot-603509861186-dev/ \
            --exclude ".gitkeep"

      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id EN88LEBW14923 \
            --paths "/*"
