AWSTemplateFormatVersion: '2010-09-09'
Description: >
  RAG Chatbot infrastructure — Phase 5.
  Adds CloudWatch dashboard, alarms, SNS alert topic, and CloudFront distribution.
  Updates Query Lambda IAM for Claude Haiku 4.5 cross-region inference profile.

Parameters:
  Environment:
    Type: String
    Default: dev
    AllowedValues: [dev, prod]
    Description: Deployment environment

  NebiusApiKeyPath:
    Type: String
    Default: /rag-chatbot/nebius-api-key
    Description: SSM parameter path for Nebius API key (must already exist)

Resources:

  # ── S3: Main bucket (documents, embeddings index, frontend) ──────────────────

  RagChatbotBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "rag-chatbot-${AWS::AccountId}-${Environment}"
      WebsiteConfiguration:
        IndexDocument: index.html
        ErrorDocument: error.html
      PublicAccessBlockConfiguration:
        BlockPublicAcls: false
        BlockPublicPolicy: false
        IgnorePublicAcls: false
        RestrictPublicBuckets: false
      VersioningConfiguration:
        Status: Enabled
      Tags:
        - Key: Project
          Value: rag-chatbot
        - Key: Environment
          Value: !Ref Environment

  RagChatbotBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref RagChatbotBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: PublicReadFrontend
            Effect: Allow
            Principal: '*'
            Action: s3:GetObject
            Resource: !Sub "${RagChatbotBucket.Arn}/frontend/*"
          - Sid: CloudTrailAclCheck
            Effect: Allow
            Principal:
              Service: cloudtrail.amazonaws.com
            Action: s3:GetBucketAcl
            Resource: !GetAtt RagChatbotBucket.Arn
          - Sid: CloudTrailWrite
            Effect: Allow
            Principal:
              Service: cloudtrail.amazonaws.com
            Action: s3:PutObject
            Resource: !Sub "${RagChatbotBucket.Arn}/cloudtrail/AWSLogs/${AWS::AccountId}/*"
            Condition:
              StringEquals:
                s3:x-amz-acl: bucket-owner-full-control

  # ── CloudWatch Log Group (Query Lambda) ──────────────────────────────────────

  LambdaLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/rag-chatbot-query-${Environment}"
      RetentionInDays: 30
      Tags:
        - Key: Project
          Value: rag-chatbot

  # ── Legacy Lambda execution role (Phase 1 placeholder) ───────────────────────
  # Exported ARN may be referenced externally. QueryLambda uses QueryLambdaRole.
  # This role is preserved only for export compatibility — do not attach it to
  # any new Lambda functions.

  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "rag-chatbot-lambda-role-${Environment}"
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: RagChatbotLambdaPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Sid: CloudWatchLogs
                Effect: Allow
                Action:
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: !Sub "${LambdaLogGroup.Arn}:*"
              - Sid: S3Access
                Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:ListBucket
                Resource:
                  - !GetAtt RagChatbotBucket.Arn
                  - !Sub "${RagChatbotBucket.Arn}/*"
              - Sid: SSMGetParameter
                Effect: Allow
                Action:
                  - ssm:GetParameter
                Resource: !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/rag-chatbot/*"
              - Sid: BedrockEmbeddings
                Effect: Allow
                Action:
                  - bedrock:InvokeModel
                Resource:
                  - !Sub "arn:aws:bedrock:${AWS::Region}::foundation-model/amazon.titan-embed-text-v1"
                  - !Sub "arn:aws:bedrock:${AWS::Region}::foundation-model/amazon.titan-embed-text-v2:0"
      Tags:
        - Key: Project
          Value: rag-chatbot

  # ── Query Lambda IAM Role ─────────────────────────────────────────────────────

  QueryLambdaRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "rag-chatbot-query-role-${Environment}"
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: QueryLambdaPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              # CloudWatch Logs
              - Sid: CloudWatchLogs
                Effect: Allow
                Action:
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: !Sub "${LambdaLogGroup.Arn}:*"
              # S3 — read vector index only
              - Sid: S3ReadIndex
                Effect: Allow
                Action:
                  - s3:GetObject
                Resource: !Sub "${RagChatbotBucket.Arn}/documents/index.json"
              # Bedrock — Titan Embeddings + legacy Claude 3 Haiku
              - Sid: BedrockEmbeddings
                Effect: Allow
                Action:
                  - bedrock:InvokeModel
                Resource:
                  - !Sub "arn:aws:bedrock:${AWS::Region}::foundation-model/amazon.titan-embed-text-v2:0"
                  - !Sub "arn:aws:bedrock:${AWS::Region}::foundation-model/anthropic.claude-3-haiku-20240307-v1:0"
              # Bedrock — Claude Haiku 4.5 cross-region inference profile (Phase 5 migration)
              - Sid: BedrockHaikuInferenceProfile
                Effect: Allow
                Action:
                  - bedrock:InvokeModel
                Resource:
                  - !Sub "arn:aws:bedrock:${AWS::Region}:${AWS::AccountId}:inference-profile/us.anthropic.claude-haiku-4-5-20251001-v1:0"
                  - "arn:aws:bedrock:*::foundation-model/anthropic.claude-haiku-4-5-20251001-v1:0"
              # AWS Marketplace — required for Claude Haiku 4.5 subscription verification
              - Sid: MarketplaceModelAccess
                Effect: Allow
                Action:
                  - aws-marketplace:ViewSubscriptions
                  - aws-marketplace:Subscribe
                Resource: "*"
              # SSM — Nebius API key
              - Sid: SSMGetParameter
                Effect: Allow
                Action:
                  - ssm:GetParameter
                Resource: !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/rag-chatbot/*"
      Tags:
        - Key: Project
          Value: rag-chatbot

  # ── API Gateway ───────────────────────────────────────────────────────────────

  RagChatbotApi:
    Type: AWS::ApiGateway::RestApi
    Properties:
      Name: !Sub "rag-chatbot-api-${Environment}"
      Description: RAG Chatbot query API
      EndpointConfiguration:
        Types:
          - REGIONAL

  QueryResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref RagChatbotApi
      ParentId: !GetAtt RagChatbotApi.RootResourceId
      PathPart: query

  # POST /query — Lambda proxy integration
  QueryMethod:
    Type: AWS::ApiGateway::Method
    DependsOn: QueryLambda
    Properties:
      RestApiId: !Ref RagChatbotApi
      ResourceId: !Ref QueryResource
      HttpMethod: POST
      AuthorizationType: NONE
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub "arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${QueryLambda.Arn}/invocations"
      MethodResponses:
        - StatusCode: '200'
          ResponseParameters:
            method.response.header.Access-Control-Allow-Origin: true

  # OPTIONS /query — CORS preflight
  QueryOptionsMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref RagChatbotApi
      ResourceId: !Ref QueryResource
      HttpMethod: OPTIONS
      AuthorizationType: NONE
      Integration:
        Type: MOCK
        RequestTemplates:
          application/json: '{"statusCode": 200}'
        IntegrationResponses:
          - StatusCode: '200'
            ResponseParameters:
              method.response.header.Access-Control-Allow-Headers: "'Content-Type,X-Amz-Date,Authorization,X-Api-Key'"
              method.response.header.Access-Control-Allow-Methods: "'POST,OPTIONS'"
              method.response.header.Access-Control-Allow-Origin: "'*'"
      MethodResponses:
        - StatusCode: '200'
          ResponseParameters:
            method.response.header.Access-Control-Allow-Headers: true
            method.response.header.Access-Control-Allow-Methods: true
            method.response.header.Access-Control-Allow-Origin: true

  # New logical ID forces redeployment on method changes.
  ApiDeploymentPhase3:
    Type: AWS::ApiGateway::Deployment
    DependsOn:
      - QueryMethod
      - QueryOptionsMethod
      - QueryLambdaApiGatewayPermission
    Properties:
      RestApiId: !Ref RagChatbotApi

  ApiStage:
    Type: AWS::ApiGateway::Stage
    Properties:
      RestApiId: !Ref RagChatbotApi
      DeploymentId: !Ref ApiDeploymentPhase3
      StageName: !Ref Environment
      MethodSettings:
        - ResourcePath: "/*"
          HttpMethod: "*"
          MetricsEnabled: true

  # ── Ingest Lambda Log Group ───────────────────────────────────────────────────

  IngestLambdaLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/rag-chatbot-ingest-${Environment}"
      RetentionInDays: 30
      Tags:
        - Key: Project
          Value: rag-chatbot

  # ── Ingest Lambda IAM Role ────────────────────────────────────────────────────

  IngestLambdaRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "rag-chatbot-ingest-role-${Environment}"
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: IngestLambdaPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Sid: CloudWatchLogs
                Effect: Allow
                Action:
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: !Sub "${IngestLambdaLogGroup.Arn}:*"
              - Sid: S3ReadDocuments
                Effect: Allow
                Action:
                  - s3:GetObject
                Resource: !Sub "${RagChatbotBucket.Arn}/documents/*"
              - Sid: S3ReadWriteIndex
                Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                Resource: !Sub "${RagChatbotBucket.Arn}/documents/index.json"
              - Sid: BedrockEmbeddings
                Effect: Allow
                Action:
                  - bedrock:InvokeModel
                Resource: !Sub "arn:aws:bedrock:${AWS::Region}::foundation-model/amazon.titan-embed-text-v2:0"
      Tags:
        - Key: Project
          Value: rag-chatbot

  # ── Ingest Lambda Function ────────────────────────────────────────────────────

  IngestLambda:
    Type: AWS::Lambda::Function
    DependsOn:
      - IngestLambdaLogGroup
      - RagChatbotBucket
    Properties:
      FunctionName: !Sub "rag-chatbot-ingest-${Environment}"
      Runtime: python3.12
      Handler: handler.lambda_handler
      Role: !GetAtt IngestLambdaRole.Arn
      Timeout: 300
      MemorySize: 512
      Code:
        S3Bucket: !Ref RagChatbotBucket
        S3Key: lambda/ingest.zip
      Environment:
        Variables:
          S3_BUCKET: !Ref RagChatbotBucket
          ENVIRONMENT: !Ref Environment
      Tags:
        - Key: Project
          Value: rag-chatbot

  IngestLambdaS3Permission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !GetAtt IngestLambda.Arn
      Action: lambda:InvokeFunction
      Principal: s3.amazonaws.com
      SourceArn: !GetAtt RagChatbotBucket.Arn
      SourceAccount: !Ref AWS::AccountId

  # ── Query Lambda Function ─────────────────────────────────────────────────────

  QueryLambda:
    Type: AWS::Lambda::Function
    DependsOn:
      - LambdaLogGroup
      - RagChatbotBucket
    Properties:
      FunctionName: !Sub "rag-chatbot-query-${Environment}"
      Runtime: python3.12
      Handler: handler.lambda_handler
      Role: !GetAtt QueryLambdaRole.Arn
      Timeout: 60
      MemorySize: 256
      Code:
        S3Bucket: !Ref RagChatbotBucket
        S3Key: lambda/query.zip
      Environment:
        Variables:
          S3_BUCKET: !Ref RagChatbotBucket
          NEBIUS_API_KEY_PATH: !Ref NebiusApiKeyPath
          ENVIRONMENT: !Ref Environment
      Tags:
        - Key: Project
          Value: rag-chatbot

  # Allows API Gateway to invoke QueryLambda
  QueryLambdaApiGatewayPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !GetAtt QueryLambda.Arn
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${RagChatbotApi}/*/POST/query"

  # ── SNS: Alert Topic ──────────────────────────────────────────────────────────

  RagChatbotAlertsTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: !Sub "RAG-Chatbot-Alerts-${Environment}"
      Tags:
        - Key: Project
          Value: rag-chatbot

  RagChatbotAlertsSubscription:
    Type: AWS::SNS::Subscription
    Properties:
      TopicArn: !Ref RagChatbotAlertsTopic
      Protocol: email
      Endpoint: jimmy.hubbard0813@gmail.com

  # ── CloudWatch: Alarms ────────────────────────────────────────────────────────

  # Error rate > 5% of invocations over a 5-minute window.
  # Uses metric math: IF(invocations > 0, errors / invocations * 100, 0)
  QueryErrorRateAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub "rag-chatbot-error-rate-${Environment}"
      AlarmDescription: "Query Lambda error rate > 5% of invocations over 5 minutes"
      Metrics:
        - Id: errors
          MetricStat:
            Metric:
              Namespace: AWS/Lambda
              MetricName: Errors
              Dimensions:
                - Name: FunctionName
                  Value: !Ref QueryLambda
            Period: 300
            Stat: Sum
          ReturnData: false
        - Id: invocations
          MetricStat:
            Metric:
              Namespace: AWS/Lambda
              MetricName: Invocations
              Dimensions:
                - Name: FunctionName
                  Value: !Ref QueryLambda
            Period: 300
            Stat: Sum
          ReturnData: false
        - Id: error_rate
          Expression: "IF(invocations > 0, errors / invocations * 100, 0)"
          ReturnData: true
      ComparisonOperator: GreaterThanThreshold
      Threshold: 5
      EvaluationPeriods: 1
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref RagChatbotAlertsTopic
      OKActions:
        - !Ref RagChatbotAlertsTopic
      Tags:
        - Key: Project
          Value: rag-chatbot

  # P95 duration > 10 seconds over a 5-minute window.
  QueryDurationAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub "rag-chatbot-p95-duration-${Environment}"
      AlarmDescription: "Query Lambda p95 duration > 10 seconds"
      Namespace: AWS/Lambda
      MetricName: Duration
      Dimensions:
        - Name: FunctionName
          Value: !Ref QueryLambda
      Period: 300
      ExtendedStatistic: p95
      ComparisonOperator: GreaterThanThreshold
      Threshold: 10000
      EvaluationPeriods: 1
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref RagChatbotAlertsTopic
      OKActions:
        - !Ref RagChatbotAlertsTopic
      Tags:
        - Key: Project
          Value: rag-chatbot

  # ── CloudWatch: Dashboard ─────────────────────────────────────────────────────

  RagChatbotDashboard:
    Type: AWS::CloudWatch::Dashboard
    Properties:
      DashboardName: RAG-Chatbot-Dashboard
      DashboardBody: !Sub |
        {
          "widgets": [
            {
              "type": "metric",
              "x": 0, "y": 0, "width": 12, "height": 6,
              "properties": {
                "title": "Invocations",
                "metrics": [["AWS/Lambda", "Invocations", "FunctionName", "${QueryLambda}", {"stat": "Sum"}]],
                "period": 300,
                "view": "timeSeries",
                "region": "${AWS::Region}"
              }
            },
            {
              "type": "metric",
              "x": 12, "y": 0, "width": 12, "height": 6,
              "properties": {
                "title": "Errors",
                "metrics": [["AWS/Lambda", "Errors", "FunctionName", "${QueryLambda}", {"stat": "Sum", "color": "#d62728"}]],
                "period": 300,
                "view": "timeSeries",
                "region": "${AWS::Region}"
              }
            },
            {
              "type": "metric",
              "x": 0, "y": 6, "width": 12, "height": 6,
              "properties": {
                "title": "P95 Duration (ms)",
                "metrics": [["AWS/Lambda", "Duration", "FunctionName", "${QueryLambda}", {"stat": "p95"}]],
                "period": 300,
                "view": "timeSeries",
                "region": "${AWS::Region}"
              }
            },
            {
              "type": "metric",
              "x": 12, "y": 6, "width": 12, "height": 6,
              "properties": {
                "title": "Estimated Cost USD (approx — 256MB, $0.0000166667/GB-s)",
                "metrics": [
                  ["AWS/Lambda", "Duration", "FunctionName", "${QueryLambda}", {"id": "m1", "stat": "Sum", "visible": false}],
                  [{"expression": "m1 / 1000 * 0.25 * 0.0000166667", "label": "Est. Cost USD", "id": "cost"}]
                ],
                "period": 300,
                "view": "timeSeries",
                "region": "${AWS::Region}"
              }
            }
          ]
        }

  # ── CloudFront: Distribution ──────────────────────────────────────────────────
  # Origin: S3 static website endpoint (HTTP-only — S3 website hosting does not
  # support HTTPS). CloudFront terminates HTTPS for viewers and redirects HTTP.
  # Default root object serves frontend/index.html at the distribution root.

  RagChatbotCloudFront:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Comment: !Sub "RAG Chatbot frontend — ${Environment}"
        Enabled: true
        DefaultRootObject: frontend/index.html
        Origins:
          - Id: S3WebsiteOrigin
            DomainName: !Select [1, !Split ["//", !GetAtt RagChatbotBucket.WebsiteURL]]
            CustomOriginConfig:
              HTTPPort: 80
              OriginProtocolPolicy: http-only
        DefaultCacheBehavior:
          TargetOriginId: S3WebsiteOrigin
          ViewerProtocolPolicy: redirect-to-https
          CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6
          AllowedMethods: [GET, HEAD]
          CachedMethods: [GET, HEAD]
        PriceClass: PriceClass_100
        HttpVersion: http2
      Tags:
        - Key: Project
          Value: rag-chatbot
        - Key: Environment
          Value: !Ref Environment

  # ── CloudTrail ────────────────────────────────────────────────────────────────

  RagChatbotTrail:
    Type: AWS::CloudTrail::Trail
    DependsOn: RagChatbotBucketPolicy
    Properties:
      TrailName: !Sub "rag-chatbot-trail-${Environment}"
      S3BucketName: !Ref RagChatbotBucket
      S3KeyPrefix: cloudtrail
      IsLogging: true
      EnableLogFileValidation: true
      IncludeGlobalServiceEvents: true
      IsMultiRegionTrail: false
      Tags:
        - Key: Project
          Value: rag-chatbot

Outputs:
  BucketName:
    Description: Main S3 bucket name
    Value: !Ref RagChatbotBucket
    Export:
      Name: !Sub "rag-chatbot-bucket-${Environment}"

  BucketWebsiteURL:
    Description: S3 static website endpoint
    Value: !GetAtt RagChatbotBucket.WebsiteURL

  ApiEndpoint:
    Description: API Gateway endpoint URL
    Value: !Sub "https://${RagChatbotApi}.execute-api.${AWS::Region}.amazonaws.com/${Environment}/query"
    Export:
      Name: !Sub "rag-chatbot-api-endpoint-${Environment}"

  LambdaRoleArn:
    Description: Legacy Lambda execution role ARN (Phase 1 placeholder — preserved for export compatibility)
    Value: !GetAtt LambdaExecutionRole.Arn
    Export:
      Name: !Sub "rag-chatbot-lambda-role-${Environment}"

  LogGroupName:
    Description: Query Lambda CloudWatch Log Group
    Value: !Ref LambdaLogGroup

  QueryLambdaArn:
    Description: Query Lambda ARN
    Value: !GetAtt QueryLambda.Arn
    Export:
      Name: !Sub "rag-chatbot-query-lambda-${Environment}"

  AlertsTopicArn:
    Description: SNS topic ARN for CloudWatch alarm notifications
    Value: !Ref RagChatbotAlertsTopic

  CloudFrontURL:
    Description: CloudFront HTTPS URL for the frontend
    Value: !Sub "https://${RagChatbotCloudFront.DomainName}"
    Export:
      Name: !Sub "rag-chatbot-cloudfront-url-${Environment}"
