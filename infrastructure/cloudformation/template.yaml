AWSTemplateFormatVersion: '2010-09-09'
Description: >
  RAG Chatbot infrastructure — Phase 3.
  Adds Query Lambda with multi-provider router (Nebius + Bedrock).
  API Gateway POST /query wired to QueryLambda (replaces Phase 1 MOCK).

Parameters:
  Environment:
    Type: String
    Default: dev
    AllowedValues: [dev, prod]
    Description: Deployment environment

  NebiusApiKeyPath:
    Type: String
    Default: /rag-chatbot/nebius-api-key
    Description: SSM parameter path for Nebius API key (must already exist)

Resources:

  # ── S3: Main bucket (documents, embeddings index, frontend) ──────────────────

  RagChatbotBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "rag-chatbot-${AWS::AccountId}-${Environment}"
      WebsiteConfiguration:
        IndexDocument: index.html
        ErrorDocument: error.html
      PublicAccessBlockConfiguration:
        BlockPublicAcls: false
        BlockPublicPolicy: false
        IgnorePublicAcls: false
        RestrictPublicBuckets: false
      VersioningConfiguration:
        Status: Enabled
      Tags:
        - Key: Project
          Value: rag-chatbot
        - Key: Environment
          Value: !Ref Environment

  RagChatbotBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref RagChatbotBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: PublicReadFrontend
            Effect: Allow
            Principal: '*'
            Action: s3:GetObject
            Resource: !Sub "${RagChatbotBucket.Arn}/frontend/*"
          - Sid: CloudTrailAclCheck
            Effect: Allow
            Principal:
              Service: cloudtrail.amazonaws.com
            Action: s3:GetBucketAcl
            Resource: !GetAtt RagChatbotBucket.Arn
          - Sid: CloudTrailWrite
            Effect: Allow
            Principal:
              Service: cloudtrail.amazonaws.com
            Action: s3:PutObject
            Resource: !Sub "${RagChatbotBucket.Arn}/cloudtrail/AWSLogs/${AWS::AccountId}/*"
            Condition:
              StringEquals:
                s3:x-amz-acl: bucket-owner-full-control

  # ── CloudWatch Log Group (Query Lambda) ──────────────────────────────────────

  LambdaLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/rag-chatbot-query-${Environment}"
      RetentionInDays: 30
      Tags:
        - Key: Project
          Value: rag-chatbot

  # ── Legacy Lambda execution role (Phase 1 placeholder) ───────────────────────
  # Exported ARN may be referenced externally. QueryLambda uses QueryLambdaRole.
  # This role is preserved only for export compatibility — do not attach it to
  # any new Lambda functions.

  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "rag-chatbot-lambda-role-${Environment}"
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: RagChatbotLambdaPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Sid: CloudWatchLogs
                Effect: Allow
                Action:
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: !Sub "${LambdaLogGroup.Arn}:*"
              - Sid: S3Access
                Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:ListBucket
                Resource:
                  - !GetAtt RagChatbotBucket.Arn
                  - !Sub "${RagChatbotBucket.Arn}/*"
              - Sid: SSMGetParameter
                Effect: Allow
                Action:
                  - ssm:GetParameter
                Resource: !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/rag-chatbot/*"
              - Sid: BedrockEmbeddings
                Effect: Allow
                Action:
                  - bedrock:InvokeModel
                Resource:
                  - !Sub "arn:aws:bedrock:${AWS::Region}::foundation-model/amazon.titan-embed-text-v1"
                  - !Sub "arn:aws:bedrock:${AWS::Region}::foundation-model/amazon.titan-embed-text-v2:0"
      Tags:
        - Key: Project
          Value: rag-chatbot

  # ── Query Lambda IAM Role ─────────────────────────────────────────────────────

  QueryLambdaRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "rag-chatbot-query-role-${Environment}"
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: QueryLambdaPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              # CloudWatch Logs — write to the existing query log group
              - Sid: CloudWatchLogs
                Effect: Allow
                Action:
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: !Sub "${LambdaLogGroup.Arn}:*"
              # S3 — read vector index only (least-privilege: single key)
              - Sid: S3ReadIndex
                Effect: Allow
                Action:
                  - s3:GetObject
                Resource: !Sub "${RagChatbotBucket.Arn}/documents/index.json"
              # Bedrock — Titan Embeddings v2 (query embedding, live)
              #           Claude 3 Haiku (generation, blocked pending AWS Support)
              - Sid: BedrockInvoke
                Effect: Allow
                Action:
                  - bedrock:InvokeModel
                Resource:
                  - !Sub "arn:aws:bedrock:${AWS::Region}::foundation-model/amazon.titan-embed-text-v2:0"
                  - !Sub "arn:aws:bedrock:${AWS::Region}::foundation-model/anthropic.claude-3-haiku-20240307-v1:0"
              # SSM — Nebius API key
              - Sid: SSMGetParameter
                Effect: Allow
                Action:
                  - ssm:GetParameter
                Resource: !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/rag-chatbot/*"
      Tags:
        - Key: Project
          Value: rag-chatbot

  # ── API Gateway ───────────────────────────────────────────────────────────────

  RagChatbotApi:
    Type: AWS::ApiGateway::RestApi
    Properties:
      Name: !Sub "rag-chatbot-api-${Environment}"
      Description: RAG Chatbot query API
      EndpointConfiguration:
        Types:
          - REGIONAL

  QueryResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref RagChatbotApi
      ParentId: !GetAtt RagChatbotApi.RootResourceId
      PathPart: query

  # POST /query — Lambda proxy integration (replaces Phase 1 MOCK)
  QueryMethod:
    Type: AWS::ApiGateway::Method
    DependsOn: QueryLambda
    Properties:
      RestApiId: !Ref RagChatbotApi
      ResourceId: !Ref QueryResource
      HttpMethod: POST
      AuthorizationType: NONE
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub "arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${QueryLambda.Arn}/invocations"
      MethodResponses:
        - StatusCode: '200'
          ResponseParameters:
            method.response.header.Access-Control-Allow-Origin: true

  # OPTIONS /query — CORS preflight, stays MOCK (correct as-is, never reaches Lambda)
  QueryOptionsMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref RagChatbotApi
      ResourceId: !Ref QueryResource
      HttpMethod: OPTIONS
      AuthorizationType: NONE
      Integration:
        Type: MOCK
        RequestTemplates:
          application/json: '{"statusCode": 200}'
        IntegrationResponses:
          - StatusCode: '200'
            ResponseParameters:
              method.response.header.Access-Control-Allow-Headers: "'Content-Type,X-Amz-Date,Authorization,X-Api-Key'"
              method.response.header.Access-Control-Allow-Methods: "'POST,OPTIONS'"
              method.response.header.Access-Control-Allow-Origin: "'*'"
      MethodResponses:
        - StatusCode: '200'
          ResponseParameters:
            method.response.header.Access-Control-Allow-Headers: true
            method.response.header.Access-Control-Allow-Methods: true
            method.response.header.Access-Control-Allow-Origin: true

  # Phase 3 deployment — new logical ID forces CloudFormation to create a new
  # AWS::ApiGateway::Deployment resource on this update. DependsOn ordering alone
  # does not guarantee redeployment on method changes; a new logical ID does.
  # Pattern: increment logical ID (ApiDeploymentPhase4, etc.) on future route changes.
  ApiDeploymentPhase3:
    Type: AWS::ApiGateway::Deployment
    DependsOn:
      - QueryMethod
      - QueryOptionsMethod
      - QueryLambdaApiGatewayPermission
    Properties:
      RestApiId: !Ref RagChatbotApi

  ApiStage:
    Type: AWS::ApiGateway::Stage
    Properties:
      RestApiId: !Ref RagChatbotApi
      DeploymentId: !Ref ApiDeploymentPhase3
      StageName: !Ref Environment
      MethodSettings:
        - ResourcePath: "/*"
          HttpMethod: "*"
          MetricsEnabled: true

  # ── Ingest Lambda Log Group ───────────────────────────────────────────────────

  IngestLambdaLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/rag-chatbot-ingest-${Environment}"
      RetentionInDays: 30
      Tags:
        - Key: Project
          Value: rag-chatbot

  # ── Ingest Lambda IAM Role ────────────────────────────────────────────────────

  IngestLambdaRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "rag-chatbot-ingest-role-${Environment}"
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: IngestLambdaPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Sid: CloudWatchLogs
                Effect: Allow
                Action:
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: !Sub "${IngestLambdaLogGroup.Arn}:*"
              - Sid: S3ReadDocuments
                Effect: Allow
                Action:
                  - s3:GetObject
                Resource: !Sub "${RagChatbotBucket.Arn}/documents/*"
              - Sid: S3ReadWriteIndex
                Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                Resource: !Sub "${RagChatbotBucket.Arn}/documents/index.json"
              - Sid: BedrockEmbeddings
                Effect: Allow
                Action:
                  - bedrock:InvokeModel
                Resource: !Sub "arn:aws:bedrock:${AWS::Region}::foundation-model/amazon.titan-embed-text-v2:0"
      Tags:
        - Key: Project
          Value: rag-chatbot

  # ── Ingest Lambda Function ────────────────────────────────────────────────────
  # PREREQUISITE: lambda/ingest.zip must be uploaded to S3 before deploy.
  # S3 event notification is NOT wired in CloudFormation (circular dependency).
  # IngestLambdaS3Permission below grants S3 the right to invoke this Lambda,
  # but bucket notifications must be configured manually via console or CLI —
  # the permission alone does nothing without that separate wiring step.

  IngestLambda:
    Type: AWS::Lambda::Function
    DependsOn:
      - IngestLambdaLogGroup
      - RagChatbotBucket
    Properties:
      FunctionName: !Sub "rag-chatbot-ingest-${Environment}"
      Runtime: python3.12
      Handler: handler.lambda_handler
      Role: !GetAtt IngestLambdaRole.Arn
      Timeout: 300
      MemorySize: 512
      Code:
        S3Bucket: !Ref RagChatbotBucket
        S3Key: lambda/ingest.zip
      Environment:
        Variables:
          S3_BUCKET: !Ref RagChatbotBucket
          ENVIRONMENT: !Ref Environment
      Tags:
        - Key: Project
          Value: rag-chatbot

  IngestLambdaS3Permission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !GetAtt IngestLambda.Arn
      Action: lambda:InvokeFunction
      Principal: s3.amazonaws.com
      SourceArn: !GetAtt RagChatbotBucket.Arn
      SourceAccount: !Ref AWS::AccountId

  # ── Query Lambda Function ─────────────────────────────────────────────────────
  # PREREQUISITE: lambda/query.zip must be uploaded to S3 before deploy.
  # See Step 7 packaging instructions.

  QueryLambda:
    Type: AWS::Lambda::Function
    DependsOn:
      - LambdaLogGroup
      - RagChatbotBucket
    Properties:
      FunctionName: !Sub "rag-chatbot-query-${Environment}"
      Runtime: python3.12
      Handler: handler.lambda_handler
      Role: !GetAtt QueryLambdaRole.Arn
      Timeout: 60
      MemorySize: 256
      Code:
        S3Bucket: !Ref RagChatbotBucket
        S3Key: lambda/query.zip
      Environment:
        Variables:
          S3_BUCKET: !Ref RagChatbotBucket
          NEBIUS_API_KEY_PATH: !Ref NebiusApiKeyPath
          ENVIRONMENT: !Ref Environment
      Tags:
        - Key: Project
          Value: rag-chatbot

  # Allows API Gateway to invoke QueryLambda — scoped to POST /query only
  QueryLambdaApiGatewayPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !GetAtt QueryLambda.Arn
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${RagChatbotApi}/*/POST/query"

  # ── CloudTrail ────────────────────────────────────────────────────────────────

  RagChatbotTrail:
    Type: AWS::CloudTrail::Trail
    DependsOn: RagChatbotBucketPolicy
    Properties:
      TrailName: !Sub "rag-chatbot-trail-${Environment}"
      S3BucketName: !Ref RagChatbotBucket
      S3KeyPrefix: cloudtrail
      IsLogging: true
      EnableLogFileValidation: true
      IncludeGlobalServiceEvents: true
      IsMultiRegionTrail: false
      Tags:
        - Key: Project
          Value: rag-chatbot

Outputs:
  BucketName:
    Description: Main S3 bucket name
    Value: !Ref RagChatbotBucket
    Export:
      Name: !Sub "rag-chatbot-bucket-${Environment}"

  BucketWebsiteURL:
    Description: S3 static website endpoint
    Value: !GetAtt RagChatbotBucket.WebsiteURL

  ApiEndpoint:
    Description: API Gateway endpoint URL
    Value: !Sub "https://${RagChatbotApi}.execute-api.${AWS::Region}.amazonaws.com/${Environment}/query"
    Export:
      Name: !Sub "rag-chatbot-api-endpoint-${Environment}"

  LambdaRoleArn:
    Description: Legacy Lambda execution role ARN (Phase 1 placeholder — preserved for export compatibility)
    Value: !GetAtt LambdaExecutionRole.Arn
    Export:
      Name: !Sub "rag-chatbot-lambda-role-${Environment}"

  LogGroupName:
    Description: Query Lambda CloudWatch Log Group
    Value: !Ref LambdaLogGroup

  QueryLambdaArn:
    Description: Query Lambda ARN
    Value: !GetAtt QueryLambda.Arn
    Export:
      Name: !Sub "rag-chatbot-query-lambda-${Environment}"
